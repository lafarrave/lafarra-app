<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Farra - Sistema Integral</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--naranja:#E8621A;--negro:#111111;--gris-dark:#1a1a1a;--gris-mid:#2a2a2a;--texto:#f0f0f0;--texto-dim:#aaaaaa;--verde:#4CAF50;--amarillo:#FFC107;--rojo:#e53935;--azul:#2196F3}
        body{background:var(--negro);color:var(--texto);font-family:'Barlow',sans-serif;font-size:14px}
        .header{display:flex;align-items:center;padding:1rem;background:var(--gris-dark);border-bottom:2px solid var(--naranja)}
        .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--naranja);text-transform:uppercase;letter-spacing:2px}
        .nav-scroll{overflow-x:auto;display:flex;background:var(--gris-dark);padding:5px;position:sticky;top:0;z-index:100}
        .tab{padding:10px 18px;cursor:pointer;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;color:var(--texto-dim);border-radius:5px;font-size:12px}
        .tab.active{background:var(--naranja);color:white}
        .panel{display:none;padding:15px}
        .panel.active{display:block}
        .card{background:var(--gris-dark);border:1px solid var(--gris-mid);border-radius:10px;padding:15px;margin-bottom:15px}
        .card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--naranja);text-transform:uppercase;margin-bottom:10px}
        table{width:100%;border-collapse:collapse;font-size:12px}
        th{text-align:left;color:var(--texto-dim);padding:8px;border-bottom:1px solid var(--gris-mid)}
        td{padding:8px;border-bottom:1px solid var(--gris-mid)}
        input,select,button{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:1px solid var(--gris-mid);background:var(--gris-mid);color:white;font-family:inherit}
        button{background:var(--naranja);font-weight:700;cursor:pointer;border:none;text-transform:uppercase}
        #loading{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1000}
        .semaforo{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700}
        .sem-ok{color:var(--verde);background:rgba(76,175,80,0.1)}
    </style>
</head>
<body>

<div id="loading">
    <div style="font-size:40px; margin-bottom:15px;">🍔</div>
    <div id="loading-text">Cocinando La Farra...</div>
    <div style="font-size:10px; color:var(--texto-dim); margin-top:10px;">Si tarda, entrará automáticamente</div>
</div>

<div class="header">
    <div class="logo-text">LA<span>:</span>FARRA</div>
    <div style="margin-left:auto; font-size:10px; color:var(--verde)">● ONLINE</div>
</div>

<div class="nav-scroll">
    <div class="tab active" onclick="changeTab('tab-pos', this)">💰 POS/Ventas</div>
    <div class="tab" onclick="changeTab('tab-inv', this)">📦 Inventario</div>
    <div class="tab" onclick="changeTab('tab-config', this)">⚙️ Config</div>
</div>

<div id="tab-pos" class="panel active">
    <div class="card">
        <div class="card-title">Nueva Venta</div>
        <input type="text" id="v-cliente" placeholder="Nombre del Cliente">
        <button onclick="saveVenta()">Registrar en Nube</button>
    </div>
    <div class="card">
        <div class="card-title">Resumen de Caja</div>
        <div id="total-caja" style="font-size:24px; font-weight:800;">$0.00</div>
    </div>
</div>

<div id="tab-inv" class="panel">
    <div class="card">
        <div class="card-title">Inventario Actual</div>
        <table>
            <thead><tr><th>Estado</th><th>Insumo</th><th>Stock</th></tr></thead>
            <tbody id="tabla-insumos"></tbody>
        </table>
    </div>
</div>

<div id="tab-config" class="panel">
    <div class="card">
        <div class="card-title">Conexión Supabase</div>
        <p style="font-size:12px; color:var(--texto-dim)">Estatus: Conectado a la Base de Datos</p>
        <button onclick="fetchData()" style="background:var(--azul); margin-top:20px;">🔄 Refrescar Datos</button>
    </div>
</div>

<script>
    const SB_URL = "https://ljgjpmlvjnqfpstltjmy.supabase.co";
    const SB_KEY = "sb_publishable_Wsf4mUEtX0W6LEyJDpuIaw_vbr_jZU6";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);
    const INSUMOS = ["Carne 1ra","Pan Brioche","Cheddar","Tomate","Cebolla","Papas Fritas"];

    let db = { ventas: [], inventario: [] };

    // FUNCIÓN PARA ENTRAR SÍ O SÍ
    function entrarYa() {
        document.getElementById('loading').style.display = 'none';
    }

    async function fetchData() {
        // Si en 3 segundos no hay respuesta, entra igual
        setTimeout(entrarYa, 3000);

        try {
            const [v, i] = await Promise.all([
                supabase.from('ventas').select('*'),
                supabase.from('inventario').select('*')
            ]);
            db.ventas = v.data || [];
            db.inventario = i.data || [];
            renderUI();
        } catch (e) {
            console.log("Error al cargar, entrando modo local...");
        } finally {
            entrarYa();
        }
    }

    async function saveVenta() {
        const cliente = document.getElementById('v-cliente').value;
        if(!cliente) return;
        
        const { error } = await supabase.from('ventas').insert([{ 
            data: { cliente, monto: 0, fecha: new Date().toISOString() } 
        }]);

        if(!error) {
            document.getElementById('v-cliente').value = '';
            fetchData();
        }
    }

    function renderUI() {
        const total = db.ventas.reduce((acc, curr) => acc + (curr.data.monto || 0), 0);
        document.getElementById('total-caja').innerText = `$${total.toFixed(2)}`;
        
        const tInv = document.getElementById('tabla-insumos');
        tInv.innerHTML = INSUMOS.map(ins => {
            const item = db.inventario.find(x => x.id === ins);
            return `<tr>
                <td><span class="semaforo sem-ok">OK</span></td>
                <td>${ins}</td>
                <td>${item ? item.data.cant : 0}</td>
            </tr>`;
        }).join('');
    }

    function changeTab(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    fetchData();
</script>
</body>
</html>
