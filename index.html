<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Farra - Sistema</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --naranja: #E8621A; --negro: #111111; --gris: #1a1a1a; --texto: #eee; }
        body { background: var(--negro); color: var(--texto); font-family: sans-serif; margin: 0; padding: 0; }
        .header { background: var(--gris); padding: 15px; border-bottom: 2px solid var(--naranja); display: flex; align-items: center; }
        #status-cloud { margin-left: auto; font-size: 10px; padding: 4px 8px; border-radius: 10px; background: #333; }
        .nav { display: flex; background: #222; overflow-x: auto; sticky; top: 0; }
        .tab { padding: 15px 20px; cursor: pointer; white-space: nowrap; font-weight: bold; font-size: 12px; border-bottom: 2px solid transparent; }
        .tab.active { border-bottom: 2px solid var(--naranja); color: var(--naranja); }
        .panel { display: none; padding: 20px; }
        .panel.active { display: block; }
        .card { background: var(--gris); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; font-size: 14px; }
        input { background: #333; color: white; border: 1px solid #444; }
        button { background: var(--naranja); color: white; font-weight: bold; cursor: pointer; }
        /* Pantalla de carga */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
    </style>
</head>
<body>

<div id="loader">
    <h2 style="color:var(--naranja)">LA FARRA</h2>
    <p id="loader-msg">Conectando con la nube...</p>
    <button onclick="forzarEntrada()" style="width: auto; padding: 10px 30px; background: #333; border: 1px solid #555;">ENTRAR YA</button>
</div>

<div class="header">
    <strong style="color:var(--naranja); letter-spacing: 1px;">LA FARRA CLOUD</strong>
    <span id="status-cloud">Iniciando...</span>
</div>

<div class="nav">
    <div class="tab active" onclick="tab('v', this)">💰 VENTAS</div>
    <div class="tab" onclick="tab('i', this)">📦 INVENTARIO</div>
    <div class="tab" onclick="tab('c', this)">⚙️ CONFIG</div>
</div>

<div id="v" class="panel active">
    <div class="card">
        <h3>Nueva Venta</h3>
        <input type="text" id="cliente" placeholder="Nombre del cliente">
        <input type="number" id="monto" placeholder="Monto total $">
        <button onclick="enviarVenta()">GUARDAR VENTA</button>
    </div>
</div>

<div id="i" class="panel">
    <div class="card">
        <h3>Insumos Críticos</h3>
        <div id="lista-inv">Cargando inventario...</div>
    </div>
</div>

<div id="c" class="panel">
    <div class="card">
        <h3>Configuración</h3>
        <button onclick="window.location.reload()" style="background: #444;">🔄 Refrescar Aplicación</button>
    </div>
</div>

<script>
    // 1. Datos de Jorge
    const SUPA_URL = "https://ljgjpmlvjnqfpstltjmy.supabase.co";
    const SUPA_KEY = "sb_publishable_Wsf4mUEtX0W6LEyJDpuIaw_vbr_jZU6";
    let client;

    // 2. Función para quitar la pantalla de carga (Blindada)
    function forzarEntrada() {
        document.getElementById('loader').style.display = 'none';
    }

    // 3. Navegación
    function tab(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // 4. Lógica de Supabase
    async function iniciar() {
        try {
            if (typeof window.supabase === 'undefined') {
                throw new Error("Librería no cargada");
            }
            client = window.supabase.createClient(SUPA_URL, SUPA_KEY);
            document.getElementById('status-cloud').innerText = "☁️ Nube: OK";
            document.getElementById('status-cloud').style.color = "#4CAF50";
        } catch (e) {
            document.getElementById('status-cloud').innerText = "⚠️ Error Nube";
            document.getElementById('status-cloud').style.color = "#e53935";
        }
        // Quitar cargador después de intentar conectar
        setTimeout(forzarEntrada, 1500);
    }

    async function enviarVenta() {
        const c = document.getElementById('cliente').value;
        const m = document.getElementById('monto').value;
        if (!c || !m) return alert("Completa los datos");

        const btn = document.querySelector('button');
        btn.innerText = "GUARDANDO...";
        btn.disabled = true;

        try {
            const { error } = await client.from('ventas').insert([{ 
                data: { cliente: c, monto: parseFloat(m), fecha: new Date() } 
            }]);
            if (error) throw error;
            alert("✅ ¡Venta guardada en la nube!");
            document.getElementById('cliente').value = '';
            document.getElementById('monto').value = '';
        } catch (e) {
            alert("❌ Error: " + e.message);
        } finally {
            btn.innerText = "GUARDAR VENTA";
            btn.disabled = false;
        }
    }

    // Ejecutar al cargar
    iniciar();
    // Seguro de vida: si falla todo, quitar loader a los 4 segundos
    setTimeout(forzarEntrada, 4000);
</script>
</body>
</html>
