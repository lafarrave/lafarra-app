<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Farra App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --naranja: #E8621A; --negro: #111111; --gris: #222; --texto: #eee; }
        body { background: var(--negro); color: var(--texto); font-family: sans-serif; margin: 0; padding: 0; }
        .header { background: var(--gris); padding: 15px; border-bottom: 2px solid var(--naranja); display: flex; justify-content: space-between; align-items: center; }
        .nav { display: flex; background: #333; overflow-x: auto; }
        .tab { padding: 15px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
        .tab.active { border-bottom: 2px solid var(--naranja); color: var(--naranja); }
        .panel { display: none; padding: 20px; }
        .panel.active { display: block; }
        .card { background: var(--gris); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: none; }
        button { background: var(--naranja); color: white; font-weight: bold; cursor: pointer; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="overlay">
    <h2 id="msg">Cargando La Farra...</h2>
    <button onclick="cerrarCarga()" style="width: auto; padding: 10px 20px; background: #444; margin-top: 20px;">Entrar a la fuerza</button>
</div>

<div class="header">
    <strong style="color:var(--naranja)">LA FARRA</strong>
    <span id="db-status" style="font-size: 10px; color: gray;">Desconectado</span>
</div>

<div class="nav">
    <div class="tab active" onclick="verTab('v', this)">VENTAS</div>
    <div class="tab" onclick="verTab('i', this)">INVENTARIO</div>
</div>

<div id="v" class="panel active">
    <div class="card">
        <h3>Registrar Venta</h3>
        <input type="text" id="cli" placeholder="Cliente">
        <input type="number" id="monto" placeholder="Monto $">
        <button onclick="vender()">Guardar en Nube</button>
    </div>
</div>

<div id="i" class="panel">
    <div class="card">
        <h3>Estado de Insumos</h3>
        <div id="lista-inv">Cargando datos...</div>
    </div>
</div>

<script>
    // Configuración
    const URL = "https://ljgjpmlvjnqfpstltjmy.supabase.co";
    const KEY = "sb_publishable_Wsf4mUEtX0W6LEyJDpuIaw_vbr_jZU6";
    let supabase;

    function cerrarCarga() {
        document.getElementById('overlay').style.display = 'none';
    }

    // Inicializar conexión
    try {
        supabase = window.supabase.createClient(URL, KEY);
        document.getElementById('db-status').innerText = "Conectado";
        document.getElementById('db-status').style.color = "green";
    } catch (e) {
        console.error("Error de Supabase:", e);
    }

    async function vender() {
        const c = document.getElementById('cli').value;
        const m = document.getElementById('monto').value;
        if (!c || !m) return alert("Llena los campos");

        const { error } = await supabase.from('ventas').insert([{ data: { cliente: c, monto: parseFloat(m) } }]);
        if (error) alert("Error: " + error.message);
        else {
            alert("¡Venta guardada!");
            document.getElementById('cli').value = '';
            document.getElementById('monto').value = '';
        }
    }

    function verTab(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // Quitar pantalla de carga automáticamente tras 2 segundos
    setTimeout(cerrarCarga, 2000);
</script>
</body>
</html>
