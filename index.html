<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Farra - Sistema Profesional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--naranja:#E8621A;--negro:#111111;--gris-dark:#1a1a1a;--gris-mid:#2a2a2a;--gris-light:#3a3a3a;--texto:#f0f0f0;--texto-dim:#aaaaaa;--verde:#4CAF50;--amarillo:#FFC107;--rojo:#e53935;--azul:#2196F3}
        body{background:var(--negro);color:var(--texto);font-family:'Barlow',sans-serif;font-size:14px;overflow-x:hidden}
        
        /* Estilos de la Interfaz Original */
        .header{display:flex;align-items:center;gap:12px;padding:.8rem 1rem;background:var(--gris-dark);border-bottom:2px solid var(--naranja);position:sticky;top:0;z-index:1001}
        .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:2px;color:var(--naranja);text-transform:uppercase}
        .logo-text span{color:var(--texto)}
        
        .nav-scroll{overflow-x:auto;display:flex;background:var(--gris-dark);padding:5px;position:sticky;top:48px;z-index:1000;border-bottom:1px solid var(--gris-mid)}
        .tab{padding:10px 18px;cursor:pointer;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;color:var(--texto-dim);border-radius:5px;transition:0.3s}
        .tab.active{background:var(--naranja);color:white}
        
        .panel{display:none;padding:15px;animation: fadeIn 0.3s}
        .panel.active{display:block}
        @keyframes fadeIn {from{opacity:0} to{opacity:1}}
        
        .card{background:var(--gris-dark);border:1px solid var(--gris-mid);border-radius:10px;padding:15px;margin-bottom:15px}
        .card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--naranja);text-transform:uppercase;margin-bottom:12px;display:flex;justify-content:space-between}
        
        table{width:100%;border-collapse:collapse;font-size:12px}
        th{text-align:left;color:var(--texto-dim);padding:10px;border-bottom:1px solid var(--gris-mid);text-transform:uppercase}
        td{padding:10px;border-bottom:1px solid var(--gris-mid)}
        
        .badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
        .bm{background:rgba(232,98,26,0.15);color:var(--naranja)}
        .bg{background:rgba(76,175,80,0.15);color:var(--verde)}
        
        input,select,button{width:100%;padding:12px;margin-top:8px;border-radius:6px;border:1px solid var(--gris-light);background:var(--gris-mid);color:white;font-family:inherit}
        button{background:var(--naranja);font-weight:700;cursor:pointer;border:none;transition:0.2s}
        button:active{transform:scale(0.98)}
        
        #loader{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--negro);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;transition:0.5s}
    </style>
</head>
<body>

<div id="loader">
    <div class="logo-text" style="font-size:30px">LA<span>:</span>FARRA</div>
    <div style="margin-top:10px;color:var(--naranja)" id="load-msg">Sincronizando Sistema...</div>
</div>

<div class="header">
    <div class="logo-text">LA<span>:</span>FARRA</div>
    <div id="cloud-indicator" style="margin-left:auto;font-size:10px;color:var(--texto-dim)">● CONECTANDO</div>
</div>

<div class="nav-scroll">
    <div class="tab active" onclick="showTab('saldo', this)">Saldo</div>
    <div class="tab" onclick="showTab('vidriera', this)">Vidriera</div>
    <div class="tab" onclick="showTab('inventario', this)">Inventario</div>
    <div class="tab" onclick="showTab('preparados', this)">Preparados</div>
    <div class="tab" onclick="showTab('menu', this)">Menú</div>
    <div class="tab" onclick="showTab('pos', this)">POS</div>
    <div class="tab" onclick="showTab('envios', this)">Envíos</div>
</div>

<div id="saldo" class="panel active">
    <div class="card">
        <div class="card-title">Resumen de Caja</div>
        <div id="caja-total" style="font-size:32px;font-weight:800">$0.00</div>
        <p style="color:var(--texto-dim);font-size:11px">Total acumulado en ventas netas</p>
    </div>
</div>

<div id="inventario" class="panel">
    <div class="card">
        <div class="card-title">Insumos y Semáforos</div>
        <div style="overflow-x:auto">
            <table>
                <thead>
                    <tr><th>Insumo</th><th>Stock</th><th>Estado</th><th>Acción</th></tr>
                </thead>
                <tbody id="lista-inventario"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="pos" class="panel">
    <div class="card">
        <div class="card-title">Registrar Venta Directa</div>
        <input type="text" id="p-cliente" placeholder="Cliente">
        <select id="p-prod"></select>
        <input type="number" id="p-monto" placeholder="Monto $">
        <button onclick="registrarVenta()">Confirmar Despacho</button>
    </div>
</div>

<script>
    const URL = "https://ljgjpmlvjnqfpstltjmy.supabase.co";
    const KEY = "sb_publishable_Wsf4mUEtX0W6LEyJDpuIaw_vbr_jZU6";
    const supabase = window.supabase.createClient(URL, KEY);

    // Listas maestras de Jorge
    const INSUMOS_BASE = ["Carne 1ra","Papada Ahuma","Pan Brioche","Cheddar","Tomate","Cebolla","Lechuga Criolla","Chorizo","Papas Fritas","Tocineta Ahuma","Mayonesa","Ketchup"];

    async function init() {
        try {
            // Sincronizar todas las tablas que Claude definió
            const [v, i, m] = await Promise.all([
                supabase.from('ventas').select('*'),
                supabase.from('inventario').select('*'),
                supabase.from('config').select('*')
            ]);

            document.getElementById('cloud-indicator').style.color = "var(--verde)";
            document.getElementById('cloud-indicator').innerText = "● NUBE ACTIVA";
            
            renderSistema(v.data, i.data);
        } catch (e) {
            console.error(e);
        } finally {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        }
    }

    function renderSistema(ventas = [], inv = []) {
        // Calcular Saldo
        const total = ventas.reduce((acc, curr) => acc + (curr.data.monto || 0), 0);
        document.getElementById('caja-total').innerText = `$${total.toFixed(2)}`;

        // Render Inventario con la lógica de semáforos de Claude
        const tbody = document.getElementById('lista-inventario');
        tbody.innerHTML = INSUMOS_BASE.map(nombre => {
            const data = inv.find(x => x.id === nombre);
            const cant = data ? data.data.cant : 0;
            let sem = "bg", txt = "Suficiente";
            
            if(cant < 1000) { sem="bm"; txt="Reponer"; }
            if(cant <= 0) { sem="br"; txt="Agotado"; }

            return `<tr>
                <td><strong>${nombre}</strong></td>
                <td>${cant}g</td>
                <td><span class="badge ${sem}">${txt}</span></td>
                <td><button style="padding:5px;font-size:10px" onclick="ajustar('${nombre}')">Ajustar</button></td>
            </tr>`;
        }).join('');
    }

    function showTab(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    async function registrarVenta() {
        const cli = document.getElementById('p-cliente').value;
        const mon = document.getElementById('p-monto').value;
        if(!cli || !mon) return alert("Faltan datos");

        const { error } = await supabase.from('ventas').insert([{
            data: { cliente: cli, monto: parseFloat(mon), fecha: new Date() }
        }]);

        if(!error) {
            alert("Venta registrada con éxito");
            location.reload();
        }
    }

    // Iniciar
    init();
    // Seguro: si la nube falla, mostrar la app igual a los 3 segundos
    setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 3000);
</script>
</body>
</html>
