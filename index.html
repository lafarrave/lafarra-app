<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Farra - Sistema Blindado</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Barlow:wght@400;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--naranja:#E8621A;--negro:#111111;--gris:#1a1a1a;--gris-m:#2a2a2a;--texto:#f0f0f0;--verde:#4CAF50;--rojo:#e53935}
        body{background:var(--negro);color:var(--texto);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh}
        
        /* HEADER */
        .header{display:flex;align-items:center;padding:12px 16px;background:var(--gris);border-bottom:2px solid var(--naranja);position:sticky;top:0;z-index:1000}
        .logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--naranja);text-transform:uppercase;letter-spacing:1px}
        .status{margin-left:auto;font-size:10px;color:#555;font-weight:bold}

        /* NAVEGACIÓN INDEPENDIENTE */
        .nav-container{display:flex;overflow-x:auto;background:var(--gris);padding:5px;gap:5px;position:sticky;top:50px;z-index:999;border-bottom:1px solid var(--gris-m)}
        .tab-btn{padding:10px 18px;cursor:pointer;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;color:#888;border-radius:4px;border:none;background:none;transition:0.2s}
        .tab-btn.active{background:var(--naranja);color:white}
        
        /* PANELES */
        .panel{display:none;padding:16px}
        .panel.active{display:block !important}
        
        .card{background:var(--gris);border:1px solid var(--gris-m);border-radius:12px;padding:16px;margin-bottom:16px}
        .card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--naranja);text-transform:uppercase;margin-bottom:12px;font-size:16px}
        
        table{width:100%;border-collapse:collapse}
        th{text-align:left;color:#888;padding:10px;font-size:11px;border-bottom:1px solid var(--gris-m)}
        td{padding:12px 10px;border-bottom:1px solid var(--gris-m)}
        input,select,button{width:100%;padding:12px;margin-top:8px;border-radius:8px;border:1px solid var(--gris-m);background:var(--gris-m);color:white}
        .btn-main{background:var(--naranja);font-weight:700;border:none;cursor:pointer;text-transform:uppercase;color:white}

        .semaforo{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:800}
        .bg{background:rgba(76,175,80,0.15);color:var(--verde)}
        .br{background:rgba(229,57,51,0.15);color:var(--rojo)}
    </style>
</head>
<body>

<div class="header">
    <div class="logo">LA<span>:</span>FARRA</div>
    <div class="status" id="cloud-status">MODO LOCAL</div>
</div>

<div class="nav-container">
    <button class="tab-btn active" onclick="cambiarSeccion('saldo', this)">Saldo</button>
    <button class="tab-btn" onclick="cambiarSeccion('vidriera', this)">Vidriera</button>
    <button class="tab-btn" onclick="cambiarSeccion('inv', this)">Inventario</button>
    <button class="tab-btn" onclick="cambiarSeccion('pos', this)">POS</button>
</div>

<div id="saldo" class="panel active">
    <div class="card">
        <div class="card-title">Resumen de Caja</div>
        <div id="val-saldo" style="font-size:36px;font-weight:800">$0.00</div>
    </div>
</div>

<div id="inv" class="panel">
    <div class="card">
        <div class="card-title">Estado de Insumos</div>
        <p style="font-size:11px;color:#888;margin-bottom:10px">* Basado en compras y stock inicial.</p>
        <div style="overflow-x:auto">
            <table>
                <thead><tr><th>Producto</th><th>Stock</th><th>Estado</th></tr></thead>
                <tbody id="tabla-body-inv"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="pos" class="panel">
    <div class="card">
        <div class="card-title">Nueva Venta</div>
        <input type="text" id="cliente" placeholder="Nombre Cliente">
        <input type="number" id="monto" placeholder="Monto total $">
        <button class="btn-main" onclick="registrarVentaLocal()">Guardar en Local</button>
    </div>
</div>

<div id="vidriera" class="panel">
    <div class="card"><div class="card-title">Vidriera</div><p>Próximamente...</p></div>
</div>

<script>
    // 1. NAVEGACIÓN INSTANTÁNEA (Funciona aunque nada más cargue)
    function cambiarSeccion(id, btn) {
        const paneles = document.querySelectorAll('.panel');
        paneles.forEach(p => p.classList.remove('active'));
        
        const botones = document.querySelectorAll('.tab-btn');
        botones.forEach(b => b.classList.remove('active'));
        
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // 2. DATOS DE JORGE (Archivo v2)
    const PRODUCTOS = ["Carne 1ra", "Pan Brioche", "Cheddar", "Papas Fritas", "Tocineta", "Chorizo"];
    let db_ventas = JSON.parse(localStorage.getItem('lf6_ven') || '[]');
    let db_inv = JSON.parse(localStorage.getItem('lf7_si') || '[]');

    function render() {
        // Saldo
        const total = db_ventas.reduce((acc, v) => acc + (parseFloat(v.monto) || 0), 0);
        document.getElementById('val-saldo').innerText = `$${total.toFixed(2)}`;

        // Inventario
        const tbody = document.getElementById('tabla-body-inv');
        tbody.innerHTML = PRODUCTOS.map(p => {
            const item = db_inv.find(i => i.prod === p);
            const cant = item ? item.cant : 0;
            return `<tr>
                <td><strong>${p}</strong></td>
                <td>${cant}g</td>
                <td><span class="semaforo ${cant > 500 ? 'bg' : 'br'}">${cant > 500 ? 'OK' : 'BAJO'}</span></td>
            </tr>`;
        }).join('');
    }

    function registrarVentaLocal() {
        const c = document.getElementById('cliente').value;
        const m = document.getElementById('monto').value;
        if(!c || !m) return alert("Completa los datos");

        db_ventas.push({cliente: c, monto: m, fecha: new Date()});
        localStorage.setItem('lf6_ven', JSON.stringify(db_ventas));
        render();
        alert("Guardado localmente. Se subirá a la nube en segundos.");
    }

    // 3. CARGA DIFERIDA DE SUPABASE (5 segundos después)
    setTimeout(() => {
        const script = document.createElement('script');
        script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
        script.onload = () => {
            console.log("Nube lista para conectar...");
            document.getElementById('cloud-status').innerText = "NUBE DISPONIBLE";
            document.getElementById('cloud-status').style.color = "var(--verde)";
        };
        document.head.appendChild(script);
    }, 5000);

    // Inicializar
    render();
</script>
</body>
</html>
