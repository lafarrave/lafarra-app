<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Farra - Gestión</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--naranja:#E8621A;--naranja-dark:#c0501a;--negro:#111111;--gris-dark:#1a1a1a;--gris-mid:#2a2a2a;--gris-light:#3a3a3a;--texto:#f0f0f0;--texto-dim:#aaaaaa;--verde:#4CAF50;--amarillo:#FFC107;--rojo:#e53935;--azul:#2196F3}
        .app{background:var(--negro);min-height:100vh;font-family:'Barlow',sans-serif;color:var(--texto)}
        .header{display:flex;align-items:center;gap:12px;padding:.8rem 1rem;background:var(--gris-dark);border-bottom:2px solid var(--naranja);margin-bottom:1rem}
        .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;letter-spacing:2px;color:var(--naranja);text-transform:uppercase}
        .logo-text span{color:var(--texto)}
        .wrap{padding:0 1rem 1rem}
        .tabs-local{display:flex;gap:0;background:var(--gris-mid);border-radius:8px;padding:3px;margin-bottom:1rem;width:fit-content;overflow-x:auto;max-width:100%}
        .tl{padding:6px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--texto-dim);transition:all .15s;white-space:nowrap}
        .tl.active{background:var(--naranja);color:#fff}
        .card{background:var(--gris-dark);border:1px solid var(--gris-mid);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:.9rem}
        .card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--naranja);margin-bottom:.8rem}
        .card-title.azul{color:var(--azul)}
        .card.azul-border{border-color:#1a3a5a}
        .fg label{display:block;font-size:11px;color:var(--texto-dim);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
        .fg input,.fg select{width:100%;background:var(--gris-mid);border:1px solid var(--gris-light);color:var(--texto);border-radius:6px;padding:7px 10px;font-size:13px;font-family:'Barlow',sans-serif}
        .fg input:focus,.fg select:focus{outline:none;border-color:var(--naranja)}
        .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px;margin-bottom:.8rem}
        .btn{background:var(--naranja);color:#fff;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .btn-azul{background:#1565C0;color:#fff;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase}
        .tw{overflow-x:auto}
        table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
        th{text-align:left;padding:7px 10px;color:var(--texto-dim);border-bottom:1px solid var(--gris-mid)}
        td{padding:8px 10px;border-bottom:1px solid var(--gris-mid);color:var(--texto)}
        .semaforo{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px}
        .sem-verde{background:#0d2b0d;color:#4CAF50;border:1px solid #2a5a2a}
        .sem-amarillo{background:#2b2200;color:#FFC107;border:1px solid #5a4800}
        .sem-rojo{background:#2b0d0d;color:#e53935;border:1px solid #5a2020}
        .dot{width:8px;height:8px;border-radius:50%}
        .dot-verde{background:#4CAF50}.dot-amarillo{background:#FFC107}.dot-rojo{background:#e53935}
        .panel{display:none}.panel.visible{display:block}
        .loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000}
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">⌛ Cargando datos...</div>
    <div class="app">
        <div class="header">
            <div class="logo-text">La<span>:</span>Farra</div>
            <div style="font-size:10px;color:var(--texto-dim);margin-left:2px;letter-spacing:1px;text-transform:uppercase">nube</div>
            <div style="margin-left:auto;font-size:11px;color:var(--texto-dim)" id="sync-status">Sincronizado</div>
        </div>

        <div class="wrap">
            <div class="tabs-local">
                <div class="tl active" onclick="showPanel('inventario',this)">📦 Inventario</div>
                <div class="tl" onclick="showPanel('stock-inicial',this)">🔵 Stock inicial</div>
                <div class="tl" onclick="showPanel('nueva-compra',this)">🛒 Nueva compra</div>
                <div class="tl" onclick="showPanel('historial',this)">📋 Historial</div>
            </div>

            <div id="panel-inventario" class="panel visible">
                <div class="card">
                    <div class="card-title">Estado en tiempo real</div>
                    <div class="tw">
                        <table>
                            <thead><tr><th>Estado</th><th>Producto</th><th>Stock</th><th>Unidad</th></tr></thead>
                            <tbody id="tabla-inv"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="panel-stock-inicial" class="panel">
                <div class="card azul-border">
                    <div class="card-title azul">Cargar Stock Inicial a la Nube</div>
                    <div class="fgrid">
                        <div class="fg"><label>Producto</label><select id="si-prod"></select></div>
                        <div class="fg"><label>Cantidad</label><input type="number" id="si-cant"></div>
                        <div class="fg"><label>Unidad</label>
                            <select id="si-unit">
                                <option value="g">Gramos (g)</option>
                                <option value="ud">Unidades (ud)</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn-azul" id="btn-si" onclick="cargarStockInicial()">Guardar en Nube</button>
                </div>
            </div>

            <div id="panel-nueva-compra" class="panel">
                <div class="card">
                    <div class="card-title">Registrar Compra</div>
                    <div class="fgrid">
                        <div class="fg"><label>Producto</label><select id="c-prod"></select></div>
                        <div class="fg"><label>Cantidad</label><input type="number" id="c-cant"></div>
                        <div class="fg"><label>Precio Total $</label><input type="number" id="c-precio"></div>
                        <div class="fg"><label>Tienda</label><input type="text" id="c-tienda"></div>
                    </div>
                    <button class="btn" id="btn-compra" onclick="registrarCompra()">Registrar en Nube</button>
                </div>
            </div>

            <div id="panel-historial" class="panel">
                <div class="card">
                    <div class="card-title">Últimos Movimientos</div>
                    <div class="tw">
                        <table>
                            <thead><tr><th>Fecha</th><th>Producto</th><th>Cantidad</th><th>Tienda</th></tr></thead>
                            <tbody id="tabla-historial"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const SB_URL = "https://ljgjpmlvjnqfpstltjmy.supabase.co";
        const SB_KEY = "sb_publishable_Wsf4mUEtX0W6LEyJDpuIaw_vbr_jZU6";
        const supabase = typeof supabase !== 'undefined' ? supabase : window.supabase.createClient(SB_URL, SB_KEY);

        const PRODS=["Carne 1ra","Papada Ahuma","Pan Brioche","Cheddar","Tomate","Cebolla","Lechuga Criolla","Chorizo","Pre Mayonesa","Ketchup","Aceite","Vinagre Manz","Perejil Polvo","Cebolla Polvo","Paprika","Ajo Polvo","Aceituna M","Pepinillo","BBQ","Teriyaki","Ajonjoli","Facilistas","Salsa Inglesa","Sal","Azucar","Limon","Ajo","Cebolla Morada","Cilantro","Perejil Fresco","Miel","Mostaza","Papas Fritas","Pechuga Pollo","Pimenton hojuela","Mantequilla","Mayonesa","Tocineta Ahuma","Pimenton","Maizena","Stickers","Botes Salsa","Bolsa Papa Marron","Servilletas","Conos Papas","Papel Alum 43x35","Bolsa Kraft 3kg","Glup 400ml","Glup 1L"];

        let db_compras = [];
        let db_inventario = [];

        async function fetchData() {
            document.getElementById('loading').style.display = 'flex';
            const { data: compras } = await supabase.from('compras').select('*').order('created_at', { ascending: false });
            const { data: inv } = await supabase.from('inventario').select('*');
            db_compras = compras || [];
            db_inventario = inv || [];
            renderAll();
            document.getElementById('loading').style.display = 'none';
        }

        async function registrarCompra() {
            const btn = document.getElementById('btn-compra');
            btn.disabled = true;
            const doc = {
                prod: document.getElementById('c-prod').value,
                cant: parseFloat(document.getElementById('c-cant').value),
                precio: parseFloat(document.getElementById('c-precio').value),
                tienda: document.getElementById('c-tienda').value,
                fecha: new Date().toISOString()
            };
            
            const { error } = await supabase.from('compras').insert([{ data: doc }]);
            if (error) alert("Error al guardar");
            else {
                alert("¡Compra guardada!");
                fetchData();
            }
            btn.disabled = false;
        }

        async function cargarStockInicial() {
            const prod = document.getElementById('si-prod').value;
            const cant = parseFloat(document.getElementById('si-cant').value);
            const unit = document.getElementById('si-unit').value;
            
            const { error } = await supabase.from('inventario').upsert([{ id: prod, data: { prod, cant, unit } }]);
            if (error) alert("Error");
            else {
                alert("Stock actualizado");
                fetchData();
            }
        }

        function renderAll() {
            const tbInv = document.getElementById('tabla-inv');
            tbInv.innerHTML = db_inventario.map(i => `
                <tr>
                    <td><span class="semaforo sem-verde"><div class="dot dot-verde"></div>OK</span></td>
                    <td>${i.data.prod}</td>
                    <td>${i.data.cant}</td>
                    <td>${i.data.unit}</td>
                </tr>
            `).join('');

            const tbHist = document.getElementById('tabla-historial');
            tbHist.innerHTML = db_compras.map(c => `
                <tr>
                    <td>${new Date(c.created_at).toLocaleDateString()}</td>
                    <td>${c.data.prod}</td>
                    <td>${c.data.cant}</td>
                    <td>${c.data.tienda}</td>
                </tr>
            `).join('');
        }

        function showPanel(name, el) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('visible'));
            document.querySelectorAll('.tl').forEach(t => t.classList.remove('active'));
            document.getElementById('panel-' + name).classList.add('visible');
            el.classList.add('active');
        }

        function init() {
            ['c-prod', 'si-prod'].forEach(id => {
                const s = document.getElementById(id);
                PRODS.forEach(p => {
                    const o = document.createElement('option');
                    o.value = p; o.textContent = p; s.appendChild(o);
                });
            });
            fetchData();
        }

        init();
    </script>
</body>
</html>
