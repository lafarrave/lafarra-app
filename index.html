<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Farra - Sistema Integral</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--naranja:#E8621A;--negro:#111111;--gris-dark:#1a1a1a;--gris-mid:#2a2a2a;--texto:#f0f0f0;--texto-dim:#aaaaaa;--verde:#4CAF50;--amarillo:#FFC107;--rojo:#e53935;--azul:#2196F3}
        body{background:var(--negro);color:var(--texto);font-family:'Barlow',sans-serif;font-size:14px;overflow-x:hidden}
        .header{display:flex;align-items:center;gap:12px;padding:.8rem 1rem;background:var(--gris-dark);border-bottom:2px solid var(--naranja)}
        .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:2px;color:var(--naranja);text-transform:uppercase}
        .nav-scroll{overflow-x:auto;display:flex;background:var(--gris-dark);padding:5px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--gris-mid)}
        .tab{padding:10px 18px;cursor:pointer;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;color:var(--texto-dim);border-radius:5px;font-size:12px}
        .tab.active{background:var(--naranja);color:white}
        .panel{display:none;padding:15px}
        .panel.active{display:block}
        .card{background:var(--gris-dark);border:1px solid var(--gris-mid);border-radius:10px;padding:15px;margin-bottom:15px}
        .card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--naranja);text-transform:uppercase;margin-bottom:10px;font-size:14px}
        table{width:100%;border-collapse:collapse;font-size:12px}
        th{text-align:left;color:var(--texto-dim);padding:8px;border-bottom:1px solid var(--gris-mid)}
        td{padding:8px;border-bottom:1px solid var(--gris-mid)}
        input,select,button{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:1px solid var(--gris-light);background:var(--gris-mid);color:white;font-family:inherit}
        button{background:var(--naranja);font-weight:700;cursor:pointer;border:none;text-transform:uppercase}
        .semaforo{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase}
        .sem-ok{background:rgba(76,175,80,0.15);color:var(--verde)}
        .sem-alerta{background:rgba(255,193,7,0.15);color:var(--amarillo)}
        .sem-critico{background:rgba(229,57,53,0.15);color:var(--rojo)}
        #loading{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1000}
    </style>
</head>
<body>

<div id="loading">
    <div style="font-size:30px; margin-bottom:10px;">🍔</div>
    <div id="loading-text">Sincronizando La Farra...</div>
    <button onclick="skipLoading()" style="width:auto; margin-top:20px; font-size:10px; padding:5px 10px; background:var(--gris-mid)">Omitir carga</button>
</div>

<div class="header">
    <div class="logo-text">LA<span>:</span>FARRA</div>
    <div style="margin-left:auto; font-size:10px; color:var(--verde)">● CLOUD</div>
</div>

<div class="nav-scroll">
    <div class="tab active" onclick="changeTab('tab-pos', this)">💰 POS/Ventas</div>
    <div class="tab" onclick="changeTab('tab-inv', this)">📦 Inventario</div>
    <div class="tab" onclick="changeTab('tab-compras', this)">🛒 Compras</div>
    <div class="tab" onclick="changeTab('tab-envios', this)">🛵 Envíos</div>
    <div class="tab" onclick="changeTab('tab-config', this)">⚙️ Config</div>
</div>

<div id="tab-pos" class="panel active">
    <div class="card">
        <div class="card-title">Nueva Venta</div>
        <input type="text" id="v-cliente" placeholder="Nombre del Cliente">
        <select id="v-metodo">
            <option value="pago-movil">Pago Móvil</option>
            <option value="efectivo">Efectivo $</option>
            <option value="zinli">Zinli</option>
        </select>
        <button onclick="saveVenta()">Registrar Venta</button>
    </div>
    <div class="card">
        <div class="card-title">Resumen de Caja</div>
        <div id="total-caja" style="font-size:24px; font-weight:800;">$0.00</div>
    </div>
</div>

<div id="tab-inv" class="panel">
    <div class="card">
        <div class="card-title">Inventario en Tiempo Real</div>
        <div style="overflow-x:auto">
            <table>
                <thead><tr><th>Estado</th><th>Insumo</th><th>Stock</th><th>Unidad</th></tr></thead>
                <tbody id="tabla-insumos"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="tab-config" class="panel">
    <div class="card">
        <div class="card-title">Herramientas de Nube</div>
        <button onclick="fetchData()" style="background:var(--azul)">🔄 Forzar Sincronización</button>
        <p style="margin-top:15px; font-size:11px; color:var(--texto-dim)">Database: Supabase / Hosting: Vercel</p>
    </div>
</div>

<script>
    const SB_URL = "https://ljgjpmlvjnqfpstltjmy.supabase.co";
    const SB_KEY = "sb_publishable_Wsf4mUEtX0W6LEyJDpuIaw_vbr_jZU6";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    const INSUMOS = ["Carne 1ra","Papada Ahuma","Pan Brioche","Cheddar","Tomate","Cebolla","Lechuga Criolla","Chorizo","Papas Fritas","Tocineta Ahuma","Mayonesa","Ketchup"];

    let db = { ventas: [], inventario: [], compras: [] };

    function skipLoading() {
        document.getElementById('loading').style.display = 'none';
    }

    async function fetchData() {
        try {
            const [v, i] = await Promise.all([
                supabase.from('ventas').select('*').limit(100),
                supabase.from('inventario').select('*')
            ]);
            db.ventas = v.data || [];
            db.inventario = i.data || [];
            renderUI();
        } catch (e) {
            console.error("Error cargando datos:", e);
        } finally {
            skipLoading();
        }
    }

    async function saveVenta() {
        const cliente = document.getElementById('v-cliente').value;
        if(!cliente) return alert("Escribe el nombre del cliente");
        
        const loader = document.getElementById('loading');
        loader.style.display = 'flex';
        document.getElementById('loading-text').innerText = "Guardando venta...";

        const { error } = await supabase.from('ventas').insert([{ 
            data: { cliente, monto: 0, fecha: new Date().toISOString() } 
        }]);

        if(!error) {
            document.getElementById('v-cliente').value = '';
            await fetchData();
        } else {
            alert("Error al guardar en la nube");
            skipLoading();
        }
    }

    function renderUI() {
        // Caja
        const total = db.ventas.reduce((acc, curr) => acc + (curr.data.monto || 0), 0);
        document.getElementById('total-caja').innerText = `$${total.toFixed(2)}`;

        // Inventario
        const tInv = document.getElementById('tabla-insumos');
        tInv.innerHTML = INSUMOS.map(ins => {
            const item = db.inventario.find(x => x.id === ins);
            const cant = item ? item.data.cant : 0;
            let sem = "sem-ok", txt = "OK";
            if(cant <= 1000) { sem="sem-alerta"; txt="BAJO"; }
            if(cant <= 500) { sem="sem-critico"; txt="CRÍTICO"; }

            return `<tr>
                <td><span class="semaforo ${sem}">${txt}</span></td>
                <td>${ins}</td>
                <td>${cant}</td>
                <td>${item ? item.data.unit : 'g/ud'}</td>
            </tr>`;
        }).join('');
    }

    function changeTab(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // Arrancar la app
    fetchData();
</script>
</body>
</html>
