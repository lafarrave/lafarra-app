<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Farra - Sistema Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Barlow:wght@400;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--naranja:#E8621A;--negro:#111111;--gris:#1a1a1a;--gris-m:#2a2a2a;--texto:#f0f0f0;--verde:#4CAF50;--rojo:#e53935}
        body{background:var(--negro);color:var(--texto);font-family:'Barlow',sans-serif;font-size:14px;overflow-x:hidden}
        
        /* HEADER FIJO */
        .header{display:flex;align-items:center;padding:12px 16px;background:var(--gris);border-bottom:2px solid var(--naranja);position:sticky;top:0;z-index:1000}
        .logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--naranja);text-transform:uppercase;letter-spacing:1px}
        .status-dot{margin-left:auto;font-size:10px;display:flex;align-items:center;gap:5px}
        .dot{width:8px;height:8px;border-radius:50%;background:#444}
        .dot.online{background:var(--verde);box-shadow:0 0 5px var(--verde)}

        /* NAVEGACIÓN QUE NO SE CONGELA */
        .nav{display:flex;overflow-x:auto;background:var(--gris);padding:5px;gap:5px;position:sticky;top:50px;z-index:999;border-bottom:1px solid var(--gris-m)}
        .tab{padding:10px 18px;cursor:pointer;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;color:#888;border-radius:4px;transition:0.2s}
        .tab.active{background:var(--naranja);color:white}
        
        /* CONTENEDORES */
        .panel{display:none;padding:16px;animation:fadeIn 0.2s ease-in}
        .panel.active{display:block}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        
        .card{background:var(--gris);border:1px solid var(--gris-m);border-radius:12px;padding:16px;margin-bottom:16px}
        .card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--naranja);text-transform:uppercase;margin-bottom:12px;font-size:16px}
        
        /* TABLAS Y FORMULARIOS */
        table{width:100%;border-collapse:collapse}
        th{text-align:left;color:#888;padding:10px;font-size:11px;border-bottom:1px solid var(--gris-m)}
        td{padding:12px 10px;border-bottom:1px solid var(--gris-m)}
        input,select,button{width:100%;padding:12px;margin-top:8px;border-radius:8px;border:1px solid var(--gris-m);background:var(--gris-m);color:white;font-size:14px}
        button{background:var(--naranja);font-weight:700;border:none;cursor:pointer;text-transform:uppercase}
        button:active{transform:scale(0.97)}

        .badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:800}
        .bg{background:rgba(76,175,80,0.15);color:var(--verde)}
        .br{background:rgba(229,57,51,0.15);color:var(--rojo)}
    </style>
</head>
<body>

<div class="header">
    <div class="logo">LA<span>:</span>FARRA</div>
    <div class="status-dot"><div id="dot" class="dot"></div> <span id="status-text">LOCAL</span></div>
</div>

<div class="nav">
    <div class="tab active" onclick="switchTab('saldo', this)">Saldo</div>
    <div class="tab" onclick="switchTab('vidriera', this)">Vidriera</div>
    <div class="tab" onclick="switchTab('inv', this)">Inventario</div>
    <div class="tab" onclick="switchTab('preparados', this)">Preparados</div>
    <div class="tab" onclick="switchTab('menu', this)">Menú</div>
    <div class="tab" onclick="switchTab('pos', this)">POS</div>
</div>

<div id="saldo" class="panel active">
    <div class="card">
        <div class="card-title">Caja Total (Ventas)</div>
        <div id="display-saldo" style="font-size:36px;font-weight:800">$0.00</div>
        <p style="color:#888;font-size:12px;margin-top:5px">Balance acumulado en la nube</p>
    </div>
</div>

<div id="inv" class="panel">
    <div class="card">
        <div class="card-title">Stock de Insumos</div>
        <table>
            <thead><tr><th>Insumo</th><th>Stock</th><th>Estado</th></tr></thead>
            <tbody id="lista-inv">
                <tr><td colspan="3" style="text-align:center;color:#888">Cargando datos...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="pos" class="panel">
    <div class="card">
        <div class="card-title">Venta Rápida</div>
        <input type="text" id="p-cliente" placeholder="Nombre del Cliente">
        <input type="number" id="p-monto" placeholder="Monto $">
        <button onclick="registrarVenta()">Guardar Venta</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Configuración Segura
    const SB_URL = "https://ljgjpmlvjnqfpstltjmy.supabase.co";
    const SB_KEY = "sb_publishable_Wsf4mUEtX0W6LEyJDpuIaw_vbr_jZU6";
    let supabase = null;

    // Insumos de Jorge (Recuperados de tus archivos)
    const PRODUCTOS = ["Carne 1ra", "Pan Brioche", "Cheddar", "Papas Fritas", "Tocineta", "Chorizo", "Mayonesa", "Ketchup"];

    // 1. FUNCIÓN DE NAVEGACIÓN (Instántanea, no depende de la red)
    function switchTab(id, el) {
        // Ocultar todos los paneles
        const panels = document.getElementsByClassName('panel');
        for (let p of panels) p.classList.remove('active');
        
        // Desactivar todas las pestañas
        const tabs = document.getElementsByClassName('tab');
        for (let t of tabs) t.classList.remove('active');
        
        // Activar el seleccionado
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // 2. INICIALIZACIÓN AISLADA
    async function init() {
        try {
            supabase = window.supabase.createClient(SB_URL, SB_KEY);
            document.getElementById('dot').classList.add('online');
            document.getElementById('status-text').innerText = "NUBE";
            fetchData();
        } catch (e) {
            console.error("Error de conexión, modo local activo.");
        }
    }

    async function fetchData() {
        if(!supabase) return;
        const { data: ventas } = await supabase.from('ventas').select('*');
        const { data: inv } = await supabase.from('inventario').select('*');
        render(ventas, inv);
    }

    function render(ventas = [], inv = []) {
        // Saldo
        const total = ventas.reduce((acc, curr) => acc + (curr.data.monto || 0), 0);
        document.getElementById('display-saldo').innerText = `$${total.toFixed(2)}`;

        // Inventario
        const tbody = document.getElementById('lista-inv');
        tbody.innerHTML = PRODUCTOS.map(p => {
            const item = inv.find(i => i.id === p);
            const cant = item ? item.data.cant : 0;
            const estado = cant > 1000 ? 'OK' : 'REPONER';
            return `<tr>
                <td><strong>${p}</strong></td>
                <td>${cant}g</td>
                <td><span class="badge ${cant > 1000 ? 'bg' : 'br'}">${estado}</span></td>
            </tr>`;
        }).join('');
    }

    async function registrarVenta() {
        const cli = document.getElementById('p-cliente').value;
        const mon = document.getElementById('p-monto').value;
        if(!cli || !mon || !supabase) return alert("Error en datos o conexión");

        const { error } = await supabase.from('ventas').insert([{
            data: { cliente: cli, monto: parseFloat(mon), fecha: new Date() }
        }]);

        if(!error) {
            alert("Venta guardada");
            location.reload();
        }
    }

    // Arrancar sin bloquear
    window.onload = init;
</script>
</body>
</html>
